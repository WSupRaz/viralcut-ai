name: viralcut-ai

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: viralcut
      POSTGRES_PASSWORD: viralcut_dev
      POSTGRES_DB: viralcut
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viralcut"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible stand-in for Cloudflare R2 in local dev, so nobody needs
  # real R2 credentials just to run the stack. Point R2_ENDPOINT_URL at this
  # in .env; unset it (or point at the real R2 endpoint) outside dev.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/viralcut-assets &&
      exit 0
      "

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../services/api:/app/services/api
      - ../packages/db_models:/app/packages/db_models
      - ../packages/edit-plan-schema/python/edit_plan_schema:/app/packages/edit_plan_schema

  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      render-worker:
        condition: service_healthy
    environment:
      RENDER_WORKER_URL: http://render-worker:3001
    volumes:
      - ../workers:/app/workers
      - ../packages/db_models:/app/packages/db_models
      - ../packages/edit-plan-schema/python/edit_plan_schema:/app/packages/edit_plan_schema

  render-worker:
    build:
      context: ..
      dockerfile: infra/docker/render-worker.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ../apps/render-worker/src:/app/apps/render-worker/src
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    env_file:
      - ../.env
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web:/app

volumes:
  postgres_data:
  minio_data:
